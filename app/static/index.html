<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI YAPI 一键填参与联调系统</title>
  <style>
    :root {
      --bg: #0f1220;
      --card: #171b2e;
      --card-2: #1d2340;
      --text: #f2f5ff;
      --sub: #a9b2d7;
      --accent: #6ea8fe;
      --accent-2: #5cf2c3;
      --danger: #ff6b6b;
      --ok: #51cf66;
      --border: #2a3257;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top right, #1f2a5a 0%, var(--bg) 45%);
      color: var(--text);
    }
    .container {
      max-width: 1100px;
      margin: 24px auto 60px;
      padding: 0 18px;
    }
    .title {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .subtitle {
      color: var(--sub);
      margin-bottom: 22px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
    }
    .card {
      background: linear-gradient(160deg, var(--card), var(--card-2));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.24);
      transition: transform .2s ease, border-color .2s ease;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: #42539a;
    }
    .card h3 { margin: 0 0 12px; font-size: 18px; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    label { color: var(--sub); font-size: 13px; }
    input, select, textarea, button {
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #11162b;
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
    }
    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      line-height: 1.45;
    }
    input, select { width: 100%; }
    button {
      background: linear-gradient(90deg, var(--accent), #7f7cff);
      border: none;
      cursor: pointer;
      font-weight: 700;
    }
    button.secondary {
      background: linear-gradient(90deg, #2b3154, #2f3660);
    }
    button.green {
      background: linear-gradient(90deg, #27b680, var(--accent-2));
      color: #08171a;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
      background: #0d1121;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      min-height: 100px;
      font-size: 12px;
    }
    .pill {
      display: inline-block;
      font-size: 12px;
      border-radius: 99px;
      padding: 4px 10px;
      background: #2f3766;
      color: #d0dafd;
      margin-right: 6px;
      margin-bottom: 6px;
    }
    .status { margin-top: 8px; font-size: 13px; color: var(--sub); }
    .ok { color: var(--ok); }
    .error { color: var(--danger); }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">AI YAPI 一键填参与自动测试系统</div>
    <div class="subtitle">
      流程：导入 YAPI -> AI 一键填充参数 -> 启动项目/调用接口 -> 自动化接口测试 -> 前端页面检查
    </div>

    <div class="grid">
      <section class="card">
        <h3>1) 导入 YAPI 并选择接口</h3>
        <div class="row">
          <input id="yapiFile" type="file" accept=".json" />
          <button id="uploadBtn">导入 YAPI</button>
        </div>
        <div style="margin-top: 10px;">
          <label>接口选择</label>
          <select id="endpointSelect"></select>
        </div>
        <div class="status" id="yapiStatus">未导入</div>
      </section>

      <section class="card">
        <h3>2) AI 一键参数填充</h3>
        <div class="row">
          <button class="green" id="fillBtn">扫描代码并 AI 生成参数</button>
        </div>
        <div style="margin-top: 10px;">
          <label>请求 Body (JSON)</label>
          <textarea id="requestBody">{}</textarea>
        </div>
        <div class="status" id="aiStatus">等待生成</div>
      </section>

      <section class="card">
        <h3>3) 快速启动项目</h3>
        <label>启动命令</label>
        <input id="startCommand" value="echo '请替换为你的启动命令，如 npm run dev 或 ./gradlew bootRun'" />
        <label style="margin-top:8px; display:block;">工作目录</label>
        <input id="workDir" value="." />
        <div class="row" style="margin-top:10px;">
          <button id="startBtn">执行启动命令</button>
        </div>
        <div class="mono" id="startOutput"></div>
      </section>

      <section class="card">
        <h3>4) AI 自动接口测试</h3>
        <label>Base URL</label>
        <input id="baseUrl" value="http://127.0.0.1:8080" />
        <div class="row" style="margin-top:10px;">
          <button id="apiTestBtn">执行接口测试</button>
        </div>
        <div class="mono" id="apiTestOutput"></div>
      </section>

      <section class="card">
        <h3>5) 前端页面检查（开发环境）</h3>
        <label>前端 URL</label>
        <input id="frontendUrl" value="http://127.0.0.1:3000" />
        <label style="margin-top:8px; display:block;">检查选择器（逗号分隔）</label>
        <input id="selectors" value="#app,.container" />
        <div class="row" style="margin-top:10px;">
          <button class="secondary" id="frontendTestBtn">执行前端检查</button>
        </div>
        <div class="mono" id="frontendOutput"></div>
      </section>
    </div>
  </div>

  <script>
    const state = { endpoints: [] };

    const endpointSelect = document.getElementById("endpointSelect");
    const yapiStatus = document.getElementById("yapiStatus");
    const aiStatus = document.getElementById("aiStatus");
    const requestBody = document.getElementById("requestBody");
    const startOutput = document.getElementById("startOutput");
    const apiTestOutput = document.getElementById("apiTestOutput");
    const frontendOutput = document.getElementById("frontendOutput");

    function setStatus(el, text, type = "normal") {
      el.textContent = text;
      el.className = "status" + (type === "ok" ? " ok" : type === "error" ? " error" : "");
    }

    function selectedEndpoint() {
      const idx = Number(endpointSelect.value || 0);
      return state.endpoints[idx];
    }

    function renderEndpoints() {
      endpointSelect.innerHTML = "";
      state.endpoints.forEach((ep, idx) => {
        const option = document.createElement("option");
        option.value = String(idx);
        option.textContent = `[${ep.method}] ${ep.path} - ${ep.title}`;
        endpointSelect.appendChild(option);
      });
    }

    async function uploadYapi() {
      const fileInput = document.getElementById("yapiFile");
      const file = fileInput.files?.[0];
      if (!file) {
        setStatus(yapiStatus, "请先选择 YAPI JSON 文件", "error");
        return;
      }
      setStatus(yapiStatus, "正在解析 YAPI...", "normal");
      const form = new FormData();
      form.append("file", file);
      const res = await fetch("/api/yapi/upload", { method: "POST", body: form });
      if (!res.ok) {
        const err = await res.text();
        setStatus(yapiStatus, `导入失败: ${err}`, "error");
        return;
      }
      const data = await res.json();
      state.endpoints = data.endpoints || [];
      renderEndpoints();
      setStatus(yapiStatus, `导入成功，共 ${state.endpoints.length} 个接口`, "ok");
    }

    async function fillParams() {
      const ep = selectedEndpoint();
      if (!ep) {
        setStatus(aiStatus, "请先导入并选择接口", "error");
        return;
      }
      setStatus(aiStatus, "正在扫描代码上下文...", "normal");
      const keywords = [ep.path, ep.title].filter(Boolean);
      const scanRes = await fetch("/api/code/scan", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          project_path: ".",
          keywords,
          max_files: 8
        })
      });
      const scanData = scanRes.ok ? await scanRes.json() : { results: [] };

      setStatus(aiStatus, "AI 正在生成参数...", "normal");
      const fillRes = await fetch("/api/ai/fill-params", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          endpoint: ep,
          code_context: scanData.results || [],
          preferred_locale: "zh-CN"
        })
      });
      if (!fillRes.ok) {
        const err = await fillRes.text();
        setStatus(aiStatus, `AI 生成失败: ${err}`, "error");
        return;
      }
      const data = await fillRes.json();
      requestBody.value = JSON.stringify(data.generated_params, null, 2);
      setStatus(aiStatus, `生成完成（provider: ${data.provider}）`, "ok");
    }

    async function startProject() {
      startOutput.textContent = "执行中...";
      const command = document.getElementById("startCommand").value;
      const working_directory = document.getElementById("workDir").value;
      const res = await fetch("/api/project/start", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ command, working_directory, env: {} })
      });
      const data = await res.json();
      startOutput.textContent = JSON.stringify(data, null, 2);
    }

    async function runApiTest() {
      const ep = selectedEndpoint();
      if (!ep) {
        apiTestOutput.textContent = "请先导入并选择接口";
        return;
      }
      let parsedBody = {};
      try {
        parsedBody = JSON.parse(requestBody.value || "{}");
      } catch {
        apiTestOutput.textContent = "请求 Body 不是合法 JSON";
        return;
      }
      apiTestOutput.textContent = "测试中...";
      const res = await fetch("/api/test/api", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          base_url: document.getElementById("baseUrl").value,
          method: ep.method,
          path: ep.path,
          body: parsedBody,
          headers: {},
          params: {},
          assertions: []
        })
      });
      const data = await res.json();
      apiTestOutput.textContent = JSON.stringify(data, null, 2);
    }

    async function runFrontendCheck() {
      const url = document.getElementById("frontendUrl").value;
      const selectors = document.getElementById("selectors").value
        .split(",")
        .map(s => s.trim())
        .filter(Boolean);
      frontendOutput.textContent = "检查中...";
      const res = await fetch("/api/test/frontend", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          url,
          checks: selectors.map(selector => ({ selector })),
          timeout_ms: 7000
        })
      });
      const data = await res.json();
      frontendOutput.textContent = JSON.stringify(data, null, 2);
    }

    document.getElementById("uploadBtn").addEventListener("click", uploadYapi);
    document.getElementById("fillBtn").addEventListener("click", fillParams);
    document.getElementById("startBtn").addEventListener("click", startProject);
    document.getElementById("apiTestBtn").addEventListener("click", runApiTest);
    document.getElementById("frontendTestBtn").addEventListener("click", runFrontendCheck);
  </script>
</body>
</html>
